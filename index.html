<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#007aff"/>
<link rel="manifest" href="manifest.json">
<title>Mi App Calorías</title>

<style>
:root{
--bg:#f2f2f7;
--card:#ffffff;
--text:#000;
--accent:#007aff;
--good:#34c759;
--bad:#ff3b30;
}

.dark{
--bg:#1c1c1e;
--card:#2c2c2e;
--text:#ffffff;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:var(--text);
}

.app{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:16px;
margin-bottom:15px;
}

select,input,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:var(--accent);
color:white;
border:none;
font-weight:bold;
}

.progress-bar{
height:10px;
background:#ddd;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:var(--good);
transition:0.3s;
}

.over{ background:var(--bad)!important; }

ul{ list-style:none; padding:0; margin:0; }
li{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}

canvas{
margin-top:10px;
}

.water{
display:flex;
justify-content:space-between;
}
</style>
</head>
<body>
<div class="app">

<h2>🔥 Mi Día</h2>

<div class="card">
<label>Meta diaria (editable)</label>
<input type="number" id="goalInput" value="1700">

<select id="foodSelect">
<option value="0">Seleccionar comida</option>
<option value="150">Tostada pan lactal</option>
<option value="320">Tostadas con huevo</option>
<option value="450">Milanesa + verduras</option>
<option value="700">Fideos con crema</option>
</select>

<input type="number" id="qty" value="1" min="1">
<button onclick="addFood()">Agregar</button>
</div>

<div class="card">
<div>Total: <b><span id="total">0</span> kcal</b></div>
<div>Déficit vs 2100: <b><span id="deficit"></span></b></div>
<div class="progress-bar"><div id="progress" class="progress"></div></div>
</div>

<div class="card">
<h3>💧 Agua</h3>
<div class="water">
<span>Vasos: <b id="waterCount">0</b>/10</span>
<button onclick="addWater()">+1 vaso</button>
</div>
</div>

<div class="card">
<h3>📊 Semana</h3>
<canvas id="chart" height="150"></canvas>
</div>

<div class="card">
<button onclick="toggleDark()">🌙 Modo oscuro</button>
</div>

</div>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

let data=JSON.parse(localStorage.getItem("data"))||{};
let water=JSON.parse(localStorage.getItem("water"))||0;

const today=new Date().toISOString().split("T")[0];
if(!data[today]) data[today]=[];

function save(){
localStorage.setItem("data",JSON.stringify(data));
localStorage.setItem("water",JSON.stringify(water));
}

function addFood(){
const cal=parseInt(document.getElementById("foodSelect").value);
const qty=parseInt(document.getElementById("qty").value);
if(cal>0){
data[today].push(cal*qty);
save(); update();
}
}

function update(){
let total=data[today].reduce((a,b)=>a+b,0);
document.getElementById("total").innerText=total;

const goal=parseInt(document.getElementById("goalInput").value);
const deficit=2100-total;
document.getElementById("deficit").innerText=
deficit>=0?deficit+" kcal 🔥":"+ "+Math.abs(deficit)+" ⚠️";

let percent=(total/goal)*100;
let bar=document.getElementById("progress");
bar.style.width=percent+"%";
if(total>goal) bar.classList.add("over");
else bar.classList.remove("over");

document.getElementById("waterCount").innerText=water;

drawChart();
}

function addWater(){
if(water<10){water++; save(); update();}
}

function drawChart(){
const ctx=document.getElementById("chart").getContext("2d");
ctx.clearRect(0,0,300,150);

let dates=Object.keys(data).slice(-7);
let max=2500;

dates.forEach((d,i)=>{
let total=data[d].reduce((a,b)=>a+b,0);
let height=(total/max)*120;
ctx.fillStyle="#007aff";
ctx.fillRect(i*40+10,130-height,20,height);
});
}

function toggleDark(){
document.body.classList.toggle("dark");
}

update();
</script>
</body>
</html>
